  description_long: |
    Livery is a structured methodology for using AI coding agents — primarily
    Claude Code — to write, review, and ship production-quality software. It
    is not a framework or a library. It is a set of documents, conventions,
    and discipline that you embed in a project repo and hand to an agent at
    the start of every session.

    The core problem it solves: agentic coding tools are powerful but
    stateless. Without a persistent constitution — explicit standards, a
    recorded design rationale, a session log, and quality gates — the agent
    optimises for local coherence and loses track of the whole. Livery is
    the whole.

    ## Four Principles

    - **Design before code** — a `SPEC.md` and `ARCHITECTURE.md` exist
      before any implementation begins; the agent reads them at the start
      of every session
    - **TDD, strictly** — red before green, always; property-based tests
      mandatory for any function that transforms data
    - **Measurable quality gates** — every session closes against a defined
      checklist; "mostly passing" is not passing
    - **Session continuity** — every decision, deviation, and quality
      baseline delta is recorded in `SESSIONS.md`, so a session six months
      later starts from a complete picture, not just source code

    ## How It Works

    Add Livery as a git submodule to your project repo. Create a
    project-specific `CLAUDE.md` that extends `livery/CLAUDE-base.md`.
    The agent reads both files at the start of every session.

    The repo includes coding standards (Ousterhout's principles, ARC naming
    rules, Rust-specific conventions), reusable skill files for common
    tasks, a feedback and self-correction system, and pre-compiled quality
    gate binaries including `prism`.

    ## Reference Implementation

    `mint` — a Rust CLI for publishing research software as citable
    scholarly artifacts — is being built using Livery from the ground up
    and serves as the primary reference implementation.

    ## Status

    Stable at v1.0. File names, paths, and section headings are stable for
    submodule pinning. Future changes follow semantic versioning.